[build]
  command = "npm run build"
  publish = "dist"

# SPA catch-all — serves index.html for any unmatched route (200 = rewrite, no URL change)
# force = false ensures real files and directories are served first
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  force  = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
