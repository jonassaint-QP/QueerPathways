[build]
	command = "npm run build"
	publish = "dist"

[functions]
	directory = "netlify/functions"
	node_bundler = "esbuild"

# Stripe success / cancel redirects
[[redirects]]
	from = "/order-confirmation"
	to = "/index.html"
	status = 200

# Soundtrack page removed — redirect old URL to home
[[redirects]]
	from = "/soundtrack/"
	to = "/"
	status = 301

[[redirects]]
	from = "/soundtrack"
	to = "/"
	status = 301

# SPA fallback
[[redirects]]
	from = "/*"
	to = "/index.html"
	status = 200
