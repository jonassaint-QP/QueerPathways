[build]
	command = "npm run build"
	publish = "dist"

[functions]
	directory = "netlify/functions"
	node_bundler = "esbuild"

# Functions passthrough — must come BEFORE the SPA catch-all
[[redirects]]
	from = "/.netlify/functions/*"
	to = "/.netlify/functions/:splat"
	status = 200
	force = true

# Stripe success / cancel redirects
[[redirects]]
	from = "/order-confirmation"
	to = "/index.html"
	status = 200

# SPA fallback
[[redirects]]
	from = "/*"
	to = "/index.html"
	status = 200
