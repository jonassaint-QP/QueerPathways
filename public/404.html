<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unmapped Territory | Queer Pathways</title>
    <style>
      :root {
        --bg: #022c22;
        --panel: rgba(6, 78, 59, 0.55);
        --text: #fef3c7;
        --muted: #fde68a;
        --accent: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: var(--text);
        background:
          radial-gradient(circle at 16% 18%, rgba(245, 158, 11, 0.18), transparent 42%),
          radial-gradient(circle at 82% 74%, rgba(245, 158, 11, 0.12), transparent 46%),
          var(--bg);
        font-family: "Inter", "Segoe UI", Roboto, sans-serif;
        padding: 1.5rem;
      }

      main {
        width: min(760px, 100%);
        border: 1px solid rgba(253, 230, 138, 0.35);
        border-radius: 22px;
        padding: 2.5rem;
        background: var(--panel);
        backdrop-filter: blur(7px);
      }

      .badge {
        display: inline-block;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: 0.72rem;
        border: 1px solid rgba(253, 230, 138, 0.45);
        border-radius: 999px;
        padding: 0.45rem 0.75rem;
        color: var(--muted);
      }

      h1 {
        margin: 1rem 0 0;
        font-size: clamp(1.85rem, 5vw, 3rem);
        line-height: 1.15;
        color: #fffbeb;
      }

      p {
        margin: 1rem 0 0;
        line-height: 1.7;
        color: var(--text);
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.6rem;
      }

      a {
        text-decoration: none;
        border-radius: 999px;
        padding: 0.72rem 1rem;
        font-weight: 700;
        font-size: 0.92rem;
      }

      .primary {
        background: #fffbeb;
        color: #052e16;
      }

      .secondary {
        color: #fffbeb;
        border: 1px solid rgba(253, 230, 138, 0.5);
      }

      .code {
        margin-top: 1rem;
        font-size: 0.88rem;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Unmapped Territory</span>
      <h1>The clinical pathway you requested is not charted here.</h1>
      <p>
        You are not lost. This route is simply unlisted. Return to the home corridor,
        or proceed directly to the Intake Terminal for guided support.
      </p>
      <p class="code">Error 404</p>
      <div class="links">
        <a class="primary" href="/">Return Home</a>
        <a class="secondary" href="/intake-terminal">Open Intake Terminal</a>
      </div>
    </main>
  </body>
</html>
