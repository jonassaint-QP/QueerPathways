<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Queer Pathways</title>
    <script>
      // Single-page app routing for GitHub Pages.
      // Redirects 404s back to index.html while preserving the URL path.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1)) +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
